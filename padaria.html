<body>
    <nav> <!-- Topo do site-->
        <div class="topo">
            <a href="index.html"><img src="img/logo.png" alt="Logo Mercadinho" class="logo"></a>

            <a href="conta.html"><img src="img/user.png" alt="Ícone de perfil" class="icone"></a>

        <a href="assados.html"><p>Assados</p></a>
        <a href="laticinios.html"><p>Laticínios</p></a>
